name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: pyproject.toml

      - name: Install dependencies
        run: pip install markdown llm llm-anthropic

      - name: Build site
        env:
          GENERATE_LLM_DOCS: "1"
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: bash site/build.sh

      - name: Commit generated docs
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          CHANGED=$(git diff --name-only HEAD -- '*/*.docs.md'; git ls-files --others --exclude-standard '*/*.docs.md')
          if [ -n "$CHANGED" ]; then
            git add '*/*.docs.md'
            STEMS=$(echo "$CHANGED" | sed 's|.*/||; s/\.docs\.md//' | tr '\n' ' ' | xargs)
            git commit -m "Generated docs: $STEMS"
            git push
          fi

      - uses: actions/configure-pages@v5

      - uses: actions/upload-pages-artifact@v3
        with:
          path: "."

      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v4
